<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
<title>Dynasties Chinoises</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'"/>
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap"/></noscript>
<style>
:root{
  --ink:#0a0806;--gold:#c9a84c;--gold2:#e8c97a;--parch:#f5eed8;--parch2:#ede3c4;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --font-h:'IM Fell English',Georgia,serif;--font-b:'Cormorant Garamond',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--ink);overflow:hidden;}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;padding-top:var(--safe-top);background:var(--ink);}

/* HEADER */
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;border-bottom:1px solid #3a2e1a;background:var(--ink);flex-shrink:0;}
#header h1{font-family:var(--font-h);font-size:1.2rem;color:var(--gold);letter-spacing:.04em;line-height:1.1;}
#header h1 span{display:block;font-size:.65rem;color:var(--gold2);font-style:italic;letter-spacing:.1em;}
#headerBtns{display:flex;align-items:center;gap:8px;}
#btnLang{background:none;border:1px solid #3a2e1a;border-radius:20px;color:var(--gold);font-size:1.1rem;cursor:pointer;padding:3px 10px;font-family:var(--font-b);}
#btnSettings{background:none;border:none;color:var(--gold);font-size:1.3rem;cursor:pointer;padding:4px;}

/* TABS */
#tabs{display:flex;background:#120f08;border-bottom:1px solid #3a2e1a;flex-shrink:0;}
.tab{flex:1;padding:9px 4px;font-family:var(--font-b);font-size:.72rem;color:#8a7a50;background:none;border:none;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}

/* DYNASTIES */
#tabDynasties{display:block;}
#filterBar{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;flex-shrink:0;background:var(--ink);border-bottom:1px solid #2a2010;scrollbar-width:none;}
#filterBar::-webkit-scrollbar{display:none;}
.pill{white-space:nowrap;padding:5px 12px;border-radius:20px;border:1px solid #4a3a1a;background:none;color:#9a8a5a;font-family:var(--font-b);font-size:.75rem;cursor:pointer;transition:all .2s;}
.pill.active{background:var(--gold);border-color:var(--gold);color:var(--ink);}
#dynastyList{padding:10px 12px 80px;}
.dynasty-card{background:#14100a;border:1px solid #3a2e1a;border-radius:8px;margin-bottom:10px;overflow:hidden;}
.dynasty-header{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;}
.dynasty-era{width:52px;text-align:center;flex-shrink:0;}
.dynasty-era .year{font-family:var(--font-b);font-size:.62rem;color:#7a6a40;line-height:1.2;}
.dynasty-era .cn{font-size:1.4rem;color:var(--gold);line-height:1;}
.dynasty-info{flex:1;}
.dynasty-info h3{font-family:var(--font-h);font-size:1rem;color:var(--parch);line-height:1.1;}
.dynasty-info .sub{font-family:var(--font-b);font-size:.75rem;color:#9a8a5a;font-style:italic;margin-top:2px;}
.dynasty-tag{font-family:var(--font-b);font-size:.62rem;padding:3px 8px;border-radius:10px;border:1px solid #4a3a1a;color:#7a6a40;white-space:nowrap;}
.dynasty-tag.ant{border-color:#8B4513;color:#cd853f;}
.dynasty-tag.imp{border-color:#4a1a1a;color:#c0392b;}
.dynasty-tag.med{border-color:#1a3a1a;color:#27ae60;}
.dynasty-tag.mod{border-color:#1a2a4a;color:#2980b9;}
.dynasty-body{display:none;padding:0 14px 14px;border-top:1px solid #2a2010;}
.dynasty-body.open{display:block;}
.dynasty-body p{font-family:var(--font-b);font-size:.85rem;color:#c8b882;line-height:1.6;margin-bottom:8px;}
.dynasty-body .facts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.fact-item{background:#0d0b06;border:1px solid #2a2010;border-radius:6px;padding:7px 10px;}
.fact-item .lbl{font-family:var(--font-b);font-size:.62rem;color:#7a6a40;text-transform:uppercase;letter-spacing:.1em;}
.fact-item .val{font-family:var(--font-h);font-size:.82rem;color:var(--gold2);margin-top:2px;}
.empereurs-btn{margin-top:10px;width:100%;padding:8px;background:none;border:1px solid var(--gold);border-radius:6px;color:var(--gold);font-family:var(--font-b);font-size:.8rem;cursor:pointer;}

/* EMPEREURS */
#tabEmpereurs{display:none;}
#empSearch{padding:10px 12px;background:var(--ink);border-bottom:1px solid #2a2010;}
#empSearch input{width:100%;padding:8px 12px;background:#14100a;border:1px solid #3a2e1a;border-radius:8px;color:var(--parch);font-family:var(--font-b);font-size:.9rem;}
#empSearch input::placeholder{color:#5a4a2a;}
#empSearch input:focus{outline:none;border-color:var(--gold);}
#empList{padding:10px 12px 80px;}
.emp-card{display:flex;align-items:center;gap:12px;padding:10px;background:#14100a;border:1px solid #2a2010;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.emp-card:active{border-color:var(--gold);}
.emp-photo{width:54px;height:54px;border-radius:6px;background:#1a1408;border:1px solid #3a2e1a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
.emp-info h4{font-family:var(--font-h);font-size:.95rem;color:var(--parch);}
.emp-info .emp-cn{font-family:var(--font-b);font-size:.8rem;color:var(--gold);font-style:italic;}
.emp-info .emp-sub{font-family:var(--font-b);font-size:.72rem;color:#7a6a40;margin-top:2px;}

/* DETAIL */
#detailOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;overflow-y:auto;padding-top:var(--safe-top);}
#detailOverlay.open{display:block;}
#detailContent{padding:16px 16px 80px;}
#detailBack{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--gold);font-family:var(--font-b);font-size:.85rem;cursor:pointer;margin-bottom:14px;}
#detailHero{display:flex;gap:14px;margin-bottom:16px;}
#detailImg{width:90px;height:110px;object-fit:cover;border-radius:8px;border:1px solid #3a2e1a;background:#1a1408;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
#detailMeta h2{font-family:var(--font-h);font-size:1.3rem;color:var(--gold);line-height:1.2;}
#detailMeta .cn-name{font-family:var(--font-b);font-size:1rem;color:var(--gold2);font-style:italic;margin:4px 0;}
#detailMeta .dynasty-badge{display:inline-block;padding:3px 10px;border-radius:12px;background:#2a1a08;border:1px solid var(--gold);font-family:var(--font-b);font-size:.72rem;color:var(--gold);}
#detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.dg-item{background:#14100a;border:1px solid #2a2010;border-radius:8px;padding:10px 12px;}
.dg-item .lbl{font-family:var(--font-b);font-size:.62rem;color:#7a6a40;text-transform:uppercase;letter-spacing:.1em;}
.dg-item .val{font-family:var(--font-h);font-size:.88rem;color:var(--parch);margin-top:3px;}
#detailBio{font-family:var(--font-b);font-size:.9rem;color:#c8b882;line-height:1.7;}
#detailBio h3{font-family:var(--font-h);font-size:1rem;color:var(--gold2);margin:14px 0 6px;}

/* CARTE */
#tabCarte{display:none;flex:1;flex-direction:column;height:100%;}
#mapContainer{flex:1;position:relative;}
#map{position:absolute;inset:0;}
.cn-popup .leaflet-popup-content-wrapper{background:rgba(10,8,6,0.96);border:1px solid #c9a84c;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.7);padding:0;}
.cn-popup .leaflet-popup-content{margin:12px 14px;}
.cn-popup .leaflet-popup-tip-container{display:none;}
.cn-popup .leaflet-popup-close-button{color:#c9a84c !important;font-size:1rem;top:6px;right:8px;}
.leaflet-control-zoom a{background:rgba(10,8,6,0.92)!important;color:#c9a84c!important;border-color:#3a2e1a!important;font-family:'IM Fell English',serif!important;}
.leaflet-control-zoom a:hover{background:#1a1408!important;}

/* QUIZ */
#tabQuiz{display:none;padding:16px 14px 80px;}
#quizHome{text-align:center;}
#quizHome h2{font-family:var(--font-h);font-size:1.4rem;color:var(--gold);margin-bottom:8px;}
#quizHome p{font-family:var(--font-b);font-size:.85rem;color:#9a8a5a;margin-bottom:20px;}
.quiz-mode-btn{display:block;width:100%;padding:12px;margin-bottom:10px;background:#14100a;border:1px solid #3a2e1a;border-radius:8px;color:var(--parch);font-family:var(--font-b);font-size:.9rem;cursor:pointer;text-align:left;transition:border-color .2s;}
.quiz-mode-btn:active{border-color:var(--gold);}
.quiz-mode-btn span{display:block;font-size:.75rem;color:#7a6a40;margin-top:3px;}
#quizGame{display:none;}
#quizProgress{display:flex;gap:4px;margin-bottom:14px;}
.qp-dot{flex:1;height:4px;border-radius:2px;background:#2a2010;}
.qp-dot.done{background:var(--gold);}
.qp-dot.current{background:var(--gold2);}
#quizQ{font-family:var(--font-h);font-size:1.1rem;color:var(--parch);margin-bottom:16px;line-height:1.4;}
#quizImg{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:14px;display:none;border:1px solid #3a2e1a;}
.quiz-opt{display:block;width:100%;padding:11px 14px;margin-bottom:8px;background:#14100a;border:1px solid #3a2e1a;border-radius:8px;color:var(--parch);font-family:var(--font-b);font-size:.9rem;cursor:pointer;text-align:left;transition:all .2s;}
.quiz-opt.correct{background:#0d2a0d;border-color:#27ae60;color:#27ae60;}
.quiz-opt.wrong{background:#2a0d0d;border-color:#c0392b;color:#c0392b;}
#quizNext{display:none;width:100%;padding:11px;background:var(--gold);border:none;border-radius:8px;color:var(--ink);font-family:var(--font-h);font-size:1rem;cursor:pointer;margin-top:8px;}
#quizResult{display:none;text-align:center;padding:20px 0;}
#quizResult h2{font-family:var(--font-h);font-size:1.5rem;color:var(--gold);margin-bottom:8px;}
#quizResult p{font-family:var(--font-b);font-size:1rem;color:#c8b882;margin-bottom:20px;}
#quizReplay{padding:11px 30px;background:none;border:1px solid var(--gold);border-radius:8px;color:var(--gold);font-family:var(--font-b);font-size:.9rem;cursor:pointer;}

/* SETTINGS */
#settingsOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;padding-top:var(--safe-top);overflow-y:auto;}
#settingsOverlay.open{display:block;}
#settingsContent{padding:20px 16px 60px;}
#settingsContent h2{font-family:var(--font-h);font-size:1.3rem;color:var(--gold);margin-bottom:4px;}
#settingsContent .sub{font-family:var(--font-b);font-size:.8rem;color:#7a6a40;margin-bottom:16px;font-style:italic;}
.apps-list{display:flex;flex-direction:column;gap:8px;}
.app-link{display:flex;align-items:center;gap:14px;padding:11px 14px;background:#14100a;border:1px solid #2a2010;border-radius:10px;cursor:pointer;transition:border-color .2s;}
.app-link:active{border-color:var(--gold);}
.app-real-icon{width:44px;height:44px;border-radius:10px;flex-shrink:0;background:#1a1408;object-fit:cover;}
.app-name{font-family:var(--font-b);font-size:.9rem;color:#c8b882;line-height:1.2;}
.app-store-badge{margin-left:auto;flex-shrink:0;height:28px;width:auto;}
.settings-close{display:block;margin:20px auto 0;padding:10px 30px;background:none;border:1px solid var(--gold);border-radius:8px;color:var(--gold);font-family:var(--font-b);cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1 id="appTitle">Dynasties Chinoises <span>中国王朝</span></h1>
    <div id="headerBtns">
      <button id="btnLang">🇬🇧</button>
      <button id="btnSettings">⚙</button>
    </div>
  </div>
  <div id="tabs">
    <button class="tab active" data-tab="Dynasties" id="tab0">Dynasties</button>
    <button class="tab" data-tab="Empereurs" id="tab1">Empereurs</button>
    <button class="tab" data-tab="Carte" id="tab2">Carte</button>
    <button class="tab" data-tab="Quiz" id="tab3">Quiz</button>
  </div>
  <div id="content">
    <div id="tabDynasties">
      <div id="filterBar"></div>
      <div id="dynastyList"></div>
    </div>
    <div id="tabEmpereurs">
      <div id="empSearch"><input id="searchInput" type="text" placeholder="Rechercher un empereur…"/></div>
      <div id="empList"></div>
    </div>
    <div id="tabCarte">
      <div id="mapContainer"><div id="map"></div></div>
    </div>
    <div id="tabQuiz">
      <div id="quizHome">
        <h2 id="quizTitle">Quiz — Dynasties Chinoises</h2>
        <p id="quizSubtitle">Testez vos connaissances sur l'histoire impériale de Chine</p>
        <button class="quiz-mode-btn" onclick="startQuiz('dynasties')" id="qm0">Dynasties<span id="qm0s">Identifiez la période et les empereurs</span></button>
        <button class="quiz-mode-btn" onclick="startQuiz('dates')" id="qm1">Dates &amp; chronologie<span id="qm1s">Placez les dynasties dans le temps</span></button>
        <button class="quiz-mode-btn" onclick="startQuiz('capitales')" id="qm2">Capitales<span id="qm2s">Retrouvez les capitales impériales</span></button>
        <button class="quiz-mode-btn" onclick="startQuiz('mix')" id="qm3">Mélange<span id="qm3s">Questions variées sur toutes les dynasties</span></button>
      </div>
      <div id="quizGame">
        <div id="quizProgress"></div>
        <div id="quizQ"></div>
        <img id="quizImg" src="" alt=""/>
        <div id="quizOpts"></div>
        <button id="quizNext" onclick="nextQuestion()">Question suivante →</button>
        <div id="quizResult">
          <h2 id="quizScore"></h2>
          <p id="quizComment"></p>
          <button id="quizReplay" onclick="backToQuizHome()">Rejouer</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="detailOverlay">
  <div id="detailContent">
    <button id="detailBack" onclick="closeDetail()">← Retour</button>
    <div id="detailHero">
      <div id="detailImg">👑</div>
      <div id="detailMeta">
        <h2 id="detailName"></h2>
        <div class="cn-name" id="detailCN"></div>
        <div class="dynasty-badge" id="detailDyn"></div>
      </div>
    </div>
    <div id="detailGrid"></div>
    <div id="detailBio"></div>
  </div>
</div>

<div id="settingsOverlay">
  <div id="settingsContent">
    <h2 id="settingsTitle">Autres applications</h2>
    <p class="sub">© Michel Garlandat</p>
    <div class="apps-list" id="appsGrid"></div>
    <button class="settings-close" onclick="document.getElementById('settingsOverlay').classList.remove('open')" id="settingsCloseBtn">Fermer</button>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ===================== I18N =====================
let lang = 'fr';

const T = {
  fr: {
    appTitle: 'Dynasties Chinoises',
    appSub: '中国王朝',
    tabs: ['Dynasties','Empereurs','Carte','Quiz'],
    search: 'Rechercher un empereur…',
    quizTitle: 'Quiz — Dynasties Chinoises',
    quizSub: "Testez vos connaissances sur l'histoire impériale de Chine",
    qm: ['Dynasties','Dates & chronologie','Capitales','Mélange'],
    qms: ["Identifiez la période et les empereurs","Placez les dynasties dans le temps","Retrouvez les capitales impériales","Questions variées sur toutes les dynasties"],
    quizNext: 'Question suivante →',
    quizReplay: 'Rejouer',
    settingsTitle: 'Autres applications',
    settingsClose: 'Fermer',
    detailBack: '← Retour',
    capitale: 'Capitale',
    voirEmpereurs: 'Voir les empereurs →',
    eraAll: 'Toutes',
    eras: {'Antiquité':'Antiquité','Impérial ancien':'Impérial','Médiéval':'Médiéval','Moderne':'Moderne'},
    facts: {empereurs:'Empereurs',duree:'Durée',fondateur:'Fondateur',fin_cause:'Fin'},
    lbl: {Règne:'Règne',Naissance:'Naissance',Décès:'Décès',Titre:'Titre'},
    avjc: 'av. J.-C.',
    quizQ: {
      dynasties: d => `À quelle période appartient la dynasty ${d.nom} (${d.cn}) ?`,
      dates: d => `Quelle est la période de la dynasty ${d.nom} ?`,
      capitales: d => `Quelle était la capitale de la dynasty ${d.nom} ?`,
    },
    score: (s,t) => `${s} / ${t}`,
    comment: p => p>=.8 ? "Excellent ! Vous maîtrisez l'histoire impériale chinoise." : p>=.5 ? "Bon score ! Quelques dynasties restent à approfondir." : "Continuez à explorer les dynasties !",
  },
  en: {
    appTitle: 'Chinese Dynasties',
    appSub: '中国王朝',
    tabs: ['Dynasties','Emperors','Map','Quiz'],
    search: 'Search an emperor…',
    quizTitle: 'Quiz — Chinese Dynasties',
    quizSub: 'Test your knowledge of Chinese imperial history',
    qm: ['Dynasties','Dates & chronology','Capitals','Mix'],
    qms: ["Identify the era of each dynasty","Place dynasties in chronological order","Find the imperial capitals","Varied questions on all dynasties"],
    quizNext: 'Next question →',
    quizReplay: 'Play again',
    settingsTitle: 'Other apps',
    settingsClose: 'Close',
    detailBack: '← Back',
    capitale: 'Capital',
    voirEmpereurs: 'See the emperors →',
    eraAll: 'All',
    eras: {'Antiquité':'Antiquity','Impérial ancien':'Early Imperial','Médiéval':'Medieval','Moderne':'Modern'},
    facts: {empereurs:'Emperors',duree:'Duration',fondateur:'Founder',fin_cause:'End'},
    lbl: {Règne:'Reign',Naissance:'Birth',Décès:'Death',Titre:'Title'},
    avjc: 'BC',
    quizQ: {
      dynasties: d => `Which era does the ${d.nom_en||d.nom} dynasty (${d.cn}) belong to?`,
      dates: d => `What is the period of the ${d.nom_en||d.nom} dynasty?`,
      capitales: d => `What was the capital of the ${d.nom_en||d.nom} dynasty?`,
    },
    score: (s,t) => `${s} / ${t}`,
    comment: p => p>=.8 ? "Excellent! You've mastered Chinese imperial history." : p>=.5 ? "Good score! A few dynasties to review." : "Keep exploring the dynasties!",
  }
};

function t(){ return T[lang]; }

function applyLang(){
  const tx = t();
  document.getElementById('appTitle').innerHTML = `${tx.appTitle} <span>${tx.appSub}</span>`;
  document.getElementById('btnLang').textContent = lang==='fr' ? '🇬🇧' : '🇫🇷';
  document.querySelectorAll('.tab').forEach((btn,i) => btn.textContent = tx.tabs[i]);
  document.getElementById('searchInput').placeholder = tx.search;
  document.getElementById('quizTitle').textContent = tx.quizTitle;
  document.getElementById('quizSubtitle').textContent = tx.quizSub;
  ['qm0','qm1','qm2','qm3'].forEach((id,i) => {
    const btn = document.getElementById(id);
    btn.childNodes[0].textContent = tx.qm[i];
    document.getElementById(id+'s').textContent = tx.qms[i];
  });
  document.getElementById('quizNext').textContent = tx.quizNext;
  document.getElementById('quizReplay').textContent = tx.quizReplay;
  document.getElementById('settingsTitle').textContent = tx.settingsTitle;
  document.getElementById('settingsCloseBtn').textContent = tx.settingsClose;
  document.getElementById('detailBack').textContent = tx.detailBack;
  // Re-render content
  buildFilterBar();
  renderDynasties();
  renderEmpereurs(document.getElementById('searchInput').value);
}

document.getElementById('btnLang').onclick = () => {
  lang = lang==='fr' ? 'en' : 'fr';
  applyLang();
};

// ===================== DATA =====================
const DYNASTIES = [
  {id:'xia',nom:'Xia',nom_en:'Xia',cn:'夏',periode:'v. 2070–1600 av. J.-C.',debut:-2070,fin:-1600,capital:'Erlitou (?)',era:'Antiquité',tag:'ant',
   desc:"Première dynasty légendaire de Chine, fondée selon la tradition par Yu le Grand qui dompte les crues du fleuve Jaune. Son existence reste débattue par les archéologues mais la culture Erlitou lui est souvent associée.",
   desc_en:"China's first legendary dynasty, traditionally founded by Yu the Great who tamed the Yellow River floods. Its existence is debated by archaeologists, but the Erlitou culture is often associated with it.",
   facts:{empereurs:'17 rois',duree:'~470 ans',fondateur:'Yu le Grand',fin_cause:'Renversée par Shang'},
   facts_en:{empereurs:'17 kings',duree:'~470 years',fondateur:'Yu the Great',fin_cause:'Overthrown by Shang'},
   position:[34.5,112.5]},

const ERAS = ['all','Antiquité','Impérial ancien','Médiéval','Moderne'];

function buildFilterBar(){
  const fb = document.getElementById('filterBar');
  fb.innerHTML = '';
  const tx = t();
  ERAS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (e===activeDynasty?' active':'');
    btn.textContent = e==='all' ? tx.eraAll : (tx.eras[e]||e);
    btn.onclick = () => {
      activeDynasty = e;
      document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      renderDynasties();
    };
    fb.appendChild(btn);
  });
}

function renderDynasties(){
  const list = document.getElementById('dynastyList');
  list.innerHTML = '';
  const tx = t();
  const filtered = activeDynasty==='all' ? DYNASTIES : DYNASTIES.filter(d=>d.era===activeDynasty);
  filtered.forEach(d => {
    const eraLabel = tx.eras[d.era] || d.era;
    const desc = lang==='en' ? (d.desc_en||d.desc) : d.desc;
    const facts = lang==='en' ? (d.facts_en||d.facts) : d.facts;
    const factLabels = tx.facts;
    const card = document.createElement('div');
    card.className = 'dynasty-card';
    card.innerHTML = `
      <div class="dynasty-header" onclick="toggleDynasty('${d.id}')">
        <div class="dynasty-era"><div class="cn">${d.cn}</div><div class="year">${d.periode}</div></div>
        <div class="dynasty-info">
          <h3>${lang==='en'?(d.nom_en||d.nom):d.nom}</h3>
          <div class="sub">${tx.capitale} : ${d.capital}</div>
        </div>
        <span class="dynasty-tag ${d.tag}">${eraLabel}</span>
      </div>
      <div class="dynasty-body" id="body_${d.id}">
        <p>${desc}</p>
        <div class="facts">
          ${Object.entries(facts).map(([k,v])=>`<div class="fact-item"><div class="lbl">${factLabels[k]||k}</div><div class="val">${v}</div></div>`).join('')}
        </div>
        <button class="empereurs-btn" onclick="showEmpsByDynasty('${d.id}')">${tx.voirEmpereurs}</button>
      </div>`;
    list.appendChild(card);
  });
}

function toggleDynasty(id){
  document.getElementById('body_'+id).classList.toggle('open');
}

// ===================== EMPEREURS =====================
function renderEmpereurs(filter='', dynastieFilter=''){
  const list = document.getElementById('empList');
  list.innerHTML = '';
  const norm = s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  let emps = EMPEREURS;
  if(dynastieFilter) emps = emps.filter(e=>e.dynastieId===dynastieFilter);
  if(filter) emps = emps.filter(e=>norm(e.nom).includes(norm(filter))||e.cn.includes(filter));
  const tx = t();
  emps.forEach(e => {
    const dyn = DYNASTIES.find(d=>d.id===e.dynastieId);
    const dynName = dyn ? (lang==='en'?(dyn.nom_en||dyn.nom):dyn.nom) : '';
    const card = document.createElement('div');
    card.className = 'emp-card';
    card.innerHTML = `
      <div class="emp-photo" id="ephoto_${e.id}">${e.emoji||'👑'}</div>
      <div class="emp-info">
        <h4>${e.nom}</h4>
        <div class="emp-cn">${e.cn}</div>
        <div class="emp-sub">${dynName} · ${e.regne}</div>
      </div>`;
    card.onclick = () => openDetail(e.id);
    list.appendChild(card);
    loadWikiImg(e.id, 'ephoto_'+e.id);
  });
  if(!emps.length) list.innerHTML=`<p style="color:#7a6a40;font-family:var(--font-b);text-align:center;padding:30px">${lang==='en'?'No results':'Aucun résultat'}</p>`;
}

document.getElementById('searchInput').addEventListener('input', e=>renderEmpereurs(e.target.value));

function showEmpsByDynasty(dynId){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-tab="Empereurs"]').classList.add('active');
  document.querySelectorAll('#content > div').forEach(d=>d.style.display='none');
  document.getElementById('tabEmpereurs').style.display='block';
  renderEmpereurs('', dynId);
}

// ===================== WIKI IMG =====================
const imgCache = {};
let jsonpCounter = 0;

function loadWikiImg(empId, elemId, size=120){
  const e = EMPEREURS.find(x=>x.id===empId);
  if(!e||!e.wikiTitle) return;
  if(imgCache[empId]){ applyImg(elemId, imgCache[empId]); return; }
  const cbName = '_wpCb'+(jsonpCounter++);
  const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(e.wikiTitle)}&prop=pageimages&piprop=thumbnail&pithumbsize=${size}&format=json&callback=${cbName}`;
  window[cbName] = function(data){
    try{
      const pages = data?.query?.pages||{};
      const imgUrl = Object.values(pages)[0]?.thumbnail?.source;
      if(imgUrl){ imgCache[empId]=imgUrl; applyImg(elemId,imgUrl); }
    }catch(err){}
    delete window[cbName];
    document.getElementById('s_'+cbName)?.remove();
  };
  const script = document.createElement('script');
  script.id = 's_'+cbName;
  script.src = url;
  script.onerror = ()=>{ delete window[cbName]; script.remove(); };
  document.head.appendChild(script);
}

function applyImg(elemId, url){
  const el = document.getElementById(elemId);
  if(!el) return;
  const img = new Image();
  img.onload = ()=>{
    el.textContent='';
    el.style.backgroundImage=`url(${url})`;
    el.style.backgroundSize='cover';
    el.style.backgroundPosition='center top';
  };
  img.src = url;
}

// ===================== DETAIL =====================
function openDetail(empId){
  const e = EMPEREURS.find(x=>x.id===empId);
  if(!e) return;
  const dyn = DYNASTIES.find(d=>d.id===e.dynastieId);
  const tx = t();
  document.getElementById('detailName').textContent = e.nom;
  document.getElementById('detailCN').textContent = e.cn;
  document.getElementById('detailDyn').textContent = dyn ? (lang==='en'?(dyn.nom_en||dyn.nom):dyn.nom) : '';
  document.getElementById('detailImg').innerHTML = e.emoji||'👑';
  document.getElementById('detailImg').style.backgroundImage = 'none';
  loadWikiImg(e.id, 'detailImg', 180);
  const titre = lang==='en' ? (e.titre_en||e.titre) : e.titre;
  const naissance = e.naissance<0 ? Math.abs(e.naissance)+' '+tx.avjc : e.naissance;
  const mort = e.mort<0 ? Math.abs(e.mort)+' '+tx.avjc : e.mort;
  document.getElementById('detailGrid').innerHTML=`
    <div class="dg-item"><div class="lbl">${tx.lbl['Règne']}</div><div class="val">${e.regne}</div></div>
    <div class="dg-item"><div class="lbl">${tx.lbl['Naissance']}</div><div class="val">${naissance}</div></div>
    <div class="dg-item"><div class="lbl">${tx.lbl['Décès']}</div><div class="val">${mort}</div></div>
    <div class="dg-item"><div class="lbl">${tx.lbl['Titre']}</div><div class="val">${titre}</div></div>`;
  document.getElementById('detailBio').innerHTML = lang==='en' ? (e.desc_en||e.desc) : e.desc;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
}

// ===================== MAP =====================
function initMap(){
  mapInit = true;
  const map = L.map('map',{zoomControl:false}).setView([35,105],4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors',maxZoom:18}).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  setTimeout(()=>map.invalidateSize(),300);
  const eraColor = {'Antiquité':'#cd853f','Impérial ancien':'#c0392b','Médiéval':'#27ae60','Moderne':'#2980b9'};
  DYNASTIES.forEach(d=>{
    if(!d.position) return;
    const color = eraColor[d.era]||'#c9a84c';
    const icon = L.divIcon({className:'',html:`<div style="width:44px;height:44px;background:#fff;border-radius:50%;border:3px solid ${color};display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 2px 8px rgba(0,0,0,0.35);cursor:pointer;">${d.cn}</div>`,iconSize:[44,44],iconAnchor:[22,22],popupAnchor:[0,-26]});
    const nom = lang==='en'?(d.nom_en||d.nom):d.nom;
    const tx = t();
    const marker = L.marker(d.position,{icon}).addTo(map);
    marker.bindPopup(`<div style="font-family:'IM Fell English',Georgia,serif;min-width:160px;cursor:pointer;" onclick="switchToDynasty('${d.id}')"><div style="font-size:1rem;color:#c9a84c;font-weight:bold;">${nom} <span style="font-size:1.1rem">${d.cn}</span></div><div style="font-size:.75rem;color:#c8b882;margin-top:3px;">${d.periode}</div><div style="font-size:.72rem;color:#8a7a50;margin-top:2px;">${tx.capitale} : ${d.capital}</div><div style="font-size:.7rem;color:${color};margin-top:5px;text-align:right;">${lang==='en'?'See profile →':'Voir la fiche →'}</div></div>`,{className:'cn-popup',maxWidth:220});
  });
}

function switchToDynasty(dynId){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-tab="Dynasties"]').classList.add('active');
  document.querySelectorAll('#content > div').forEach(d=>d.style.display='none');
  document.getElementById('tabDynasties').style.display='block';
  setTimeout(()=>{
    const body=document.getElementById('body_'+dynId);
    if(body&&!body.classList.contains('open')) body.classList.add('open');
    body?.closest('.dynasty-card')?.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

// ===================== QUIZ =====================
function buildQuestions(mode){
  const tx = t();
  const qs = [];
  if(mode==='dynasties'||mode==='mix'){
    DYNASTIES.forEach(d=>{
      const allNames = DYNASTIES.map(x=>lang==='en'?(x.nom_en||x.nom):x.nom);
      const ans = lang==='en'?(d.nom_en||d.nom):d.nom;
      const opts = shuffle(allNames.filter(n=>n!==ans).slice(0,3).concat([ans]));
      qs.push({q:tx.quizQ.dynasties(d),opts,ans});
    });
  }
  if(mode==='dates'||mode==='mix'){
    DYNASTIES.forEach(d=>{
      const decoys = shuffle(DYNASTIES.filter(x=>x.id!==d.id).map(x=>x.periode)).slice(0,3);
      qs.push({q:tx.quizQ.dates(d),opts:shuffle([...decoys,d.periode]),ans:d.periode});
    });
  }
  if(mode==='capitales'||mode==='mix'){
    DYNASTIES.forEach(d=>{
      const decoys = shuffle(DYNASTIES.filter(x=>x.id!==d.id).map(x=>x.capital)).slice(0,3);
      qs.push({q:tx.quizQ.capitales(d),opts:shuffle([...decoys,d.capital]),ans:d.capital});
    });
  }
  return shuffle(qs).slice(0,10);
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

function startQuiz(mode){
  quizQuestions=buildQuestions(mode); quizIdx=0; quizScore=0;
  document.getElementById('quizHome').style.display='none';
  document.getElementById('quizGame').style.display='block';
  document.getElementById('quizResult').style.display='none';
  showQuestion();
}

function showQuestion(){
  const q=quizQuestions[quizIdx];
  answered=false;
  document.getElementById('quizNext').style.display='none';
  document.getElementById('quizResult').style.display='none';
  const prog=document.getElementById('quizProgress');
  prog.innerHTML='';
  quizQuestions.forEach((_,i)=>{ const dot=document.createElement('div'); dot.className='qp-dot'+(i<quizIdx?' done':i===quizIdx?' current':''); prog.appendChild(dot); });
  document.getElementById('quizQ').textContent=q.q;
  document.getElementById('quizImg').style.display='none';
  const opts=document.getElementById('quizOpts');
  opts.innerHTML='';
  q.opts.forEach(o=>{ const btn=document.createElement('button'); btn.className='quiz-opt'; btn.textContent=o; btn.onclick=()=>answerQuiz(o,q.ans,btn); opts.appendChild(btn); });
}

function answerQuiz(chosen,correct,btn){
  if(answered) return;
  answered=true;
  if(chosen===correct){ btn.classList.add('correct'); quizScore++; }
  else{ btn.classList.add('wrong'); document.querySelectorAll('.quiz-opt').forEach(b=>{ if(b.textContent===correct) b.classList.add('correct'); }); }
  document.querySelectorAll('.quiz-opt').forEach(b=>b.onclick=null);
  if(quizIdx<quizQuestions.length-1) document.getElementById('quizNext').style.display='block';
  else setTimeout(showResult,800);
}

function nextQuestion(){ quizIdx++; showQuestion(); }

function showResult(){
  const tx=t();
  document.getElementById('quizOpts').innerHTML='';
  document.getElementById('quizNext').style.display='none';
  document.getElementById('quizQ').textContent='';
  document.getElementById('quizResult').style.display='block';
  document.getElementById('quizScore').textContent=tx.score(quizScore,quizQuestions.length);
  document.getElementById('quizComment').textContent=tx.comment(quizScore/quizQuestions.length);
  document.getElementById('quizReplay').textContent=tx.quizReplay;
}

function backToQuizHome(){
  document.getElementById('quizHome').style.display='block';
  document.getElementById('quizGame').style.display='none';
}

      div.onclick=()=>window.open(`https://apps.apple.com/fr/app/${a.id}`,'_system');
      list.appendChild(div);
      const cb='_itunes_'+numId;
      window[cb]=function(data){ const icon=data?.results?.[0]?.artworkUrl100; if(icon){ const el=document.getElementById('icon_'+numId); if(el) el.src=icon; } delete window[cb]; document.getElementById('s_'+cb)?.remove(); };

      document.head.appendChild(s);
    });

};
